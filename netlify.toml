# ── AnnaData – Netlify Configuration ────────────────────────────────────────
# Place this file in the root of your Netlify site alongside annadata_demo.html
# ─────────────────────────────────────────────────────────────────────────────

[build]
  # Netlify will find functions in this directory
  functions = "netlify/functions"
  # No build step needed – HTML is already compiled
  publish = "."

# ── Clean /api/* shorthand ────────────────────────────────────────────────────
# Routes  /api?endpoint=...  →  /.netlify/functions/api?endpoint=...
# This means the HTML can call fetch('/api?endpoint=branches') instead of
# the longer /.netlify/functions/api path.

[[redirects]]
  from   = "/api"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

# ── Optional: CORS pre-flight pass-through ────────────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
